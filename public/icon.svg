<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners (maskable safe zone) -->
  <rect width="512" height="512" rx="112" fill="#2563eb"/>
  <!-- Lucide-style anchor, scaled and centred -->
  <g transform="translate(256,256) scale(14) translate(-12,-12)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Circle at top -->
    <circle cx="12" cy="5" r="3"/>
    <!-- Vertical shaft -->
    <line x1="12" y1="8" x2="12" y2="19"/>
    <!-- Horizontal crossbar -->
    <line x1="5" y1="12" x2="19" y2="12"/>
    <!-- Left arm curving down -->
    <path d="M5 12 C5 16.5 8 19 12 19"/>
    <!-- Right arm curving down -->
    <path d="M19 12 C19 16.5 16 19 12 19"/>
  </g>
</svg>
